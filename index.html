<html lang="es">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Fondo con degradado azul y rojo suave */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #2563eb, #dc2626); 
            padding: 20px; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .tarjeta { 
            background: white; 
            border-radius: 25px; 
            padding: 40px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            max-width: 350px; 
            width: 90%; 
        }
        
        .logo { width: 100%; height: auto; border-radius: 15px; margin-bottom: 20px; }
        h1 { color: #333; margin: 10px 0; font-size: 24px; }
        .nombre-negocio { color: #2563eb; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        
        /* Botones con estilo azul y rojo */
        .boton { display: block; width: 100%; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 50px; font-weight: 600; color: white; transition: 0.3s; }
        .boton:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .btn-catalogo { background: #dc2626; } /* Rojo para catálogo */
        .btn-whatsapp { background: #25d366; } /* Verde WhatsApp (inalterable) */
        .btn-mapa { background: #4285f4; } /* Azul Google Maps */
        
        /* Iconos de redes sociales */
        .redes-sociales {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .icono-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2563eb;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: transform 0.3s, background 0.3s;
        }
        
        .icono-social:hover {
            transform: scale(1.1);
            background: #dc2626;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <img src="https://raw.githubusercontent.com/roygalan340/roygarcia-sellos-de-goma/main/dfasfdasfdasfdasdfasdf.png" alt="Logo" class="logo">
        <h1></h1>
        <p class="nombre-negocio">prueva 100</p>
        <p></p>
